name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - os: windows-latest
            target: i686-pc-windows-msvc
            name: windows-x86
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: windows-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: linux-arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev \
            gcc-aarch64-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const f = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(f,'utf8'));
            c.version = '$VERSION';
            fs.writeFileSync(f, JSON.stringify(c, null, 2));
          "
          echo "Building version $VERSION"

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Rename binaries with version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          WIN_EXE="src-tauri/target/${{ matrix.target }}/release/creality-im.exe"
          LIN_BIN="src-tauri/target/${{ matrix.target }}/release/creality-im"
          if [ -f "$WIN_EXE" ]; then
            cp "$WIN_EXE" "src-tauri/target/${{ matrix.target }}/release/creality-im-$VERSION.exe"
          fi
          if [ -f "$LIN_BIN" ]; then
            cp "$LIN_BIN" "src-tauri/target/${{ matrix.target }}/release/creality-im-$VERSION"
          fi

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/creality-im-*.exe

      - name: Package macOS app bundle
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APP=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            zip -r "CrealityIM-$VERSION-${{ matrix.name }}.zip" "$APP"
          fi

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            CrealityIM-*-${{ matrix.name }}.zip

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/creality-im-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
